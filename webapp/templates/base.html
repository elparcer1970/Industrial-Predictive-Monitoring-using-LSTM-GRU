<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sensor Prediction System{% endblock %}</title>
  <meta name="description" content="Industrial Predictive Monitoring using LSTM &amp; GRU — NASA CMAPSS Dataset">

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark" id="mainNav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <span class="brand-icon">🏭</span>
      <span class="brand-text">SensorAI</span>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">
            <i class="bi bi-house-door me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'predict_page' %}active{% endif %}"
             href="{{ url_for('predict_page') }}">
            <i class="bi bi-cpu me-1"></i>Predict
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'about_page' %}active{% endif %}"
             href="{{ url_for('about_page') }}">
            <i class="bi bi-info-circle me-1"></i>About
          </a>
        </li>
        <li class="nav-item ms-2">
          <a class="btn btn-cyan btn-sm"
             href="https://github.com/dinraj910" target="_blank" rel="noopener">
            <i class="bi bi-github me-1"></i>GitHub
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Main content ───────────────────────────────────────────────────────── -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="site-footer py-4 mt-5">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
        <span class="footer-brand">🏭 SensorAI</span>
        <span class="text-muted ms-2">— Multivariate Sensor Prediction System</span>
      </div>
      <div class="col-md-6 text-center text-md-end">
        <span class="text-muted small">
          Built by
          <a href="https://dinrajkdinesh.vercel.app" target="_blank" rel="noopener"
             class="footer-link">DINRAJ K DINESH</a>
          &nbsp;·&nbsp;
          <a href="https://github.com/dinraj910" target="_blank" rel="noopener"
             class="footer-link">GitHub</a>
          &nbsp;·&nbsp;
          Trained on NASA CMAPSS
        </span>
      </div>
    </div>
  </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
